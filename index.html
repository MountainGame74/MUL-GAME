<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Game - Hardcore Birds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f7f7f7; font-family: 'Courier New', Courier, monospace; }
        #game-container { width: 100%; height: 400px; position: absolute; top: 50%; transform: translateY(-50%); }
        canvas { display: block; width: 100%; height: 400px; background-color: #f7f7f7; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = 400;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let highScore = localStorage.getItem('dinoHighScoreOnly') || 0;
        let gameSpeed = 6;
        let isGameOver = false;
        let gravity = 0.8;
        let obstacles = [];
        let nextObstacleFrame = 0;
        const groundY = 350;

        let keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        let dino = { 
            x: 50, 
            y: groundY - 50, 
            width: 50, 
            height: 50, 
            baseHeight: 50, 
            duckHeight: 20, // Plus plat pour être sûr de passer
            dy: 0, 
            jumpForce: 16, 
            grounded: false,
            isDucking: false
        };

        function resetGame() {
            score = 0; gameSpeed = 6; obstacles = []; isGameOver = false;
            dino.y = groundY - 50; dino.dy = 0; nextObstacleFrame = 0;
        }

        function spawnObstacle() {
            let rand = Math.random();
            if (rand < 0.5 && score > 5) { 
                // OISEAUX PLUS BAS : Le bas de l'oiseau est à groundY - 30.
                // Le Dino debout fait 50px de haut, donc il se prend l'oiseau à coup sûr !
                obstacles.push({ x: canvas.width, y: groundY - 60, w: 45, h: 25, type: 'bird' });
            } else {
                let h = 40 + Math.random() * 50;
                obstacles.push({ x: canvas.width, y: groundY - h, w: 30, h: h, type: 'cactus' });
            }
        }

        function loop() {
            if (!isGameOver) {
                if (keys['ArrowDown'] && dino.grounded) {
                    dino.isDucking = true;
                    dino.height = dino.duckHeight;
                } else {
                    dino.isDucking = false;
                    dino.height = dino.baseHeight;
                }

                if ((keys['Space'] || keys['ArrowUp']) && dino.grounded && !dino.isDucking) {
                    dino.dy = -dino.jumpForce;
                    dino.grounded = false;
                }

                dino.dy += gravity;
                dino.y += dino.dy;
                
                if (dino.y + dino.height > groundY) { 
                    dino.y = groundY - dino.height; 
                    dino.dy = 0; 
                    dino.grounded = true; 
                }

                if (nextObstacleFrame <= 0) {
                    spawnObstacle();
                    nextObstacleFrame = (50 + Math.random() * 80) / (gameSpeed / 6);
                }
                nextObstacleFrame--;

                obstacles.forEach((obs, i) => {
                    obs.x -= gameSpeed;
                    
                    // Collision
                    if (dino.x < obs.x + obs.w && dino.x + dino.width > obs.x && 
                        dino.y < obs.y + obs.h && dino.y + dino.height > obs.y) {
                        isGameOver = true;
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('dinoHighScoreOnly', highScore);
                        }
                    }
                    if (obs.x + obs.w < 0) {
                        obstacles.splice(i, 1);
                        score++;
                        gameSpeed += 0.07;
                    }
                });
            }
