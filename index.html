<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Game - Chaos & Birds Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f7f7f7; font-family: 'Courier New', Courier, monospace; }
        
        #game-container { 
            width: 100%; 
            height: 400px; 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%); 
        }

        canvas { display: block; width: 100%; height: 400px; background-color: #f7f7f7; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = 400;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- VARIABLES ---
        let score = 0;
        let highScore = localStorage.getItem('dinoHighScoreOnly') || 0;
        
        let gameSpeed = 6;
        let isGameOver = false;
        
        // --- NOUVEAUX RÉGLAGES PHYSIQUE (pour le grand Dino) ---
        let gravity = 0.8; // Un peu plus forte
        let obstacles = [];
        let nextObstacleFrame = 0; // Pour l'apparition aléatoire
        const groundY = 350;

        let keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        // --- DINO PLUS GRAND (50x50) ---
        let dino = { 
            x: 50, 
            y: groundY - 50, // Ajusté pour le sol
            width: 50, // Plus large
            height: 50, // Plus haut
            baseHeight: 50, 
            duckHeight: 25, // Baissé, il fait 25px de haut
            dy: 0, 
            jumpForce: 16, // Saut plus puissant pour compenser la taille/gravité
            grounded: false,
            isDucking: false
        };

        function resetGame() {
            score = 0;
            gameSpeed = 6;
            obstacles = [];
            isGameOver = false;
            dino.y = groundY - 50;
            dino.dy = 0;
            nextObstacleFrame = 0; // Reset du timer aléatoire
        }

        function spawnObstacle() {
            let rand = Math.random();
            // INVASION D'OISEAUX : 50% de chance si score > 5
            if (rand < 0.5 && score > 5) { 
                // Position Y : Légèrement plus bas pour forcer le ducking (groundY - 80)
                obstacles.push({ x: canvas.width, y: groundY - 80, w: 40, h: 30, type: 'bird' });
            } else {
                // Cactus de tailles variées
                let h = 35 + Math.random() * 55;
                obstacles.push({ x: canvas.width, y: groundY - h, w: 30, h: h, type: 'cactus' });
            }
        }

        function loop() {
            if (!isGameOver) {
                // LOGIQUE SAUT / BAISSE
                if (keys['ArrowDown'] && dino.grounded) {
                    dino.isDucking = true;
                    dino.height = dino.duckHeight;
                } else {
                    dino.isDucking = false;
                    dino.height = dino.baseHeight;
                }

                if ((keys['Space'] || keys['ArrowUp']) && dino.grounded && !dino.isDucking) {
                    dino.dy = -dino.jumpForce;
                    dino.grounded = false;
                }

                dino.dy += gravity;
                dino.y += dino.dy;
                
                if (dino.y + dino.height > groundY) { 
                    dino.y = groundY - dino.height; 
                    dino.dy = 0; 
                    dino.grounded = true; 
                }

                // --- APPARITION ALÉATOIRE DES OBSTACLES ---
                // On décide aléatoirement de la distance du prochain obstacle
                if (nextObstacleFrame <= 0) {
                    spawnObstacle();
                    // Entre 60 et 150 frames de distance (réduit avec la vitesse)
                    nextObstacleFrame = (60 + Math.random() * 90) / (gameSpeed / 6);
                }
                nextObstacleFrame--;

                obstacles.forEach((obs, i) => {
                    obs.x -= gameSpeed;
                    
                    // COLLISION (ajustée aux nouvelles tailles)
                    if (dino.x < obs.x + obs.w && dino.x + dino.width > obs.x && 
                        dino.y < obs.y + obs.h && dino.y + dino.height > obs.y) {
                        
                        isGameOver = true;
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('dinoHighScoreOnly', highScore);
                        }
                    }
                    if (obs.x + obs.w < 0) {
                        obstacles.splice(i, 1);
                        score++;
                        gameSpeed += 0.06; // Accélération légèrement plus rapide
                    }
                });
            } else {
                if (keys['Space'] || keys['ArrowUp']) {
                    resetGame();
                }
            }

            draw();
            requestAnimationFrame(loop);
        }

        function draw() {
            ctx.fillStyle = "#f7f7f7";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Sol
            ctx.fillStyle = "#535353";
            ctx.fillRect(0, groundY, canvas.width, 3); // Ligne de sol plus épaisse

            // Dino (avec couleur de Chrome)
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height); 
            
            // Obstacles
            obstacles.forEach(obs => {
                // Les oiseaux sont un peu plus sombres pour mieux les voir arriver
                ctx.fillStyle = obs.type === 'bird' ? "#757575" : "#535353";
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });

            // Score actuel
            ctx.fillStyle = "#535353";
            ctx.font = "20px Courier New";
            ctx.textAlign = "right";
            ctx.fillText(score.toString().padStart(5, '0'), canvas.width - 20, 40);

            // Record
            ctx.fillStyle = "#999";
            ctx.font = "16px Courier New";
            ctx.fillText("HI " + highScore.toString().padStart(5, '0'), canvas.width - 20, 65);

            if (isGameOver) {
                ctx.textAlign = "center";
                ctx.fillStyle = "#535353";
                ctx.font = "bold 26px Courier New";
                ctx.fillText("G A M E  O V E R", canvas.width/2, 180);
                ctx.font = "16px Courier New";
                ctx.fillText("ESPACE OU HAUT POUR RECOMMENCER", canvas.width/2, 220);
            }
        }

        loop();
    </script>
</body>
</html>
