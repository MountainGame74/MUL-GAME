<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Game - Pixel Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f7f7f7; font-family: 'Courier New', Courier, monospace; }
        #game-container { width: 100%; height: 400px; position: absolute; top: 50%; transform: translateY(-50%); }
        canvas { display: block; width: 100%; height: 400px; background-color: #f7f7f7; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = 400;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let highScore = localStorage.getItem('dinoHighScoreOnly') || 0;
        let gameSpeed = 5;
        let isGameOver = false;
        let gravity = 0.8;
        let obstacles = [];
        let clouds = [];
        let nextObstacleFrame = 0;
        const groundY = 350;

        let keys = {};
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        let dino = { 
            x: 50, y: groundY - 50, width: 44, height: 48, 
            baseHeight: 48, duckHeight: 25, dy: 0, 
            jumpForce: 16, grounded: false, isDucking: false
        };

        // Fonctions de dessin "Pixel Art"
        function drawDino(x, y, w, h, isDucking) {
            ctx.fillStyle = "#535353";
            if (!isDucking) {
                // Corps
                ctx.fillRect(x + 10, y, 30, 10); // Tête
                ctx.fillRect(x + 35, y + 2, 8, 5); // Museau
                ctx.fillRect(x, y + 10, 35, 25); // Tronc
                ctx.fillRect(x + 5, y + 35, 5, 10); // Jambe L
                ctx.fillRect(x + 25, y + 35, 5, 10); // Jambe R
                ctx.fillRect(x + 12, y + 5, 4, 4); // Oeil (vide)
                ctx.fillStyle = "#f7f7f7";
                ctx.fillRect(x + 12, y + 5, 2, 2);
            } else {
                // Dino baissé
                ctx.fillStyle = "#535353";
                ctx.fillRect(x, y, 45, 20); // Corps allongé
                ctx.fillRect(x + 35, y - 5, 15, 10); // Tête en avant
            }
        }

        function drawCactus(x, y, w, h) {
            ctx.fillStyle = "#535353";
            ctx.fillRect(x + w/3, y, w/3, h); // Tronc principal
            ctx.fillRect(x, y + h/3, w, 5); // Branche horizontale
            ctx.fillRect(x, y + h/10, 5, h/3); // Pic gauche
            ctx.fillRect(x + w - 5, y + h/10, 5, h/3); // Pic droit
        }

        function drawBird(x, y, w, h, frame) {
            ctx.fillStyle = "#757575";
            ctx.fillRect(x, y + 5, w, 10); // Corps
            ctx.fillRect(x + w - 10, y, 10, 8); // Tête
            // Ailes qui battent selon les frames
            let wingPos = Math.sin(Date.now() / 100) > 0 ? -10 : 10;
            ctx.fillRect(x + 15, y + 5, 10, wingPos); 
        }

        function spawnCloud() {
            clouds.push({ x: canvas.width, y: 50 + Math.random() * 100, speed: 1 + Math.random() });
        }

        function resetGame() {
            score = 0; gameSpeed = 5; obstacles = []; clouds = []; isGameOver = false;
            dino.y = groundY - 50; dino.dy = 0; nextObstacleFrame = 50;
        }

        function spawnObstacle() {
            let rand = Math.random();
            if (rand < 0.4 && score > 20) { 
                obstacles.push({ x: canvas.width, y: groundY - 70, w: 45, h: 25, type: 'bird' });
            } else {
                let treeHeight = (Math.random() > 0.5) ? 40 : 60; 
                obstacles.push({ x: canvas.width, y: groundY - treeHeight, w: 30, h: treeHeight, type: 'cactus' });
            }
        }

        function loop() {
            if (!isGameOver) {
                if (keys['ArrowDown'] && dino.grounded) {
                    dino.isDucking = true; dino.height = dino.duckHeight;
                } else {
                    dino.isDucking = false; dino.height = dino.baseHeight;
                }
                if ((keys['Space'] || keys['ArrowUp']) && dino.grounded && !dino.isDucking) {
                    dino.dy = -dino.jumpForce; dino.grounded = false;
                }

                dino.dy += gravity; dino.y += dino.dy;
                if (dino.y + dino.height > groundY) { dino.y = groundY - dino.height; dino.dy = 0; dino.grounded = true; }

                if (nextObstacleFrame <= 0) { spawnObstacle(); nextObstacleFrame = (50 + Math.random() * 80) / (gameSpeed / 6); }
                nextObstacleFrame--;

                if (Math.random() < 0.005) spawnCloud();

                clouds.forEach((c, i) => { c.x -= c.speed; if (c.x < -100) clouds.splice(i, 1); });

                obstacles.forEach((obs, i) => {
                    obs.x -= gameSpeed;
                    if (dino.x < obs.x + obs.w && dino.x + dino.width > obs.x && dino.y < obs.y + obs.h && dino.y + dino.height > obs.y) {
                        isGameOver = true;
                        if (score > highScore) { highScore = score; localStorage.setItem('dinoHighScoreOnly', highScore); }
                    }
                    if (obs.x + obs.w < 0) { obstacles.splice(i, 1); score++; gameSpeed += 0.03; }
                });
            } else {
                if (keys['Space'] || keys['ArrowUp']) resetGame();
            }
            draw();
            requestAnimationFrame(loop);
        }

        function draw() {
            ctx.fillStyle = "#f7f7f7";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Nuages
            ctx.fillStyle = "#e0e0e0";
            clouds.forEach(c => {
                ctx.fillRect(c.x, c.y, 40, 15);
                ctx.fillRect(c.x + 10, c.y - 10, 20, 10);
            });

            // Sol avec texture
            ctx.fillStyle = "#535353";
            ctx.fillRect(0, groundY, canvas.width, 2);
            for(let i=0; i<canvas.width; i+=100) { ctx.fillRect(i + (Date.now()/20 % 100), groundY + 5, 2, 2); }

            // Dino
            drawDino(dino.x, dino.y, dino.width, dino.height, dino.isDucking);
            
            // Obstacles
            obstacles.forEach(obs => {
                if (obs.type === 'bird') drawBird(obs.x, obs.y, obs.w, obs.h);
                else drawCactus(obs.x, obs.y, obs.w, obs.h);
            });

            // Scores
            ctx.fillStyle = "#535353";
            ctx.font = "20px Courier New";
            ctx.textAlign = "right";
            ctx.fillText(score.toString().padStart(5, '0'), canvas.width - 20, 40);
            ctx.fillStyle = "#999";
            ctx.fillText("HI " + highScore.toString().padStart(5, '0'), canvas.width - 20, 65);

            if (isGameOver) {
                ctx.textAlign = "center";
                ctx.fillStyle = "#535353";
                ctx.font = "bold 26px Courier New";
                ctx.fillText("G A M E  O V E R", canvas.width/2, 180);
            }
        }
        loop();
    </script>
</body>
</html>
